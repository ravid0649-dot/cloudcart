<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudCart | Admin</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">CloudCart</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/static/products.html">Products</a>
        <a href="/static/cart.html">Cart</a>
        <a href="/static/orders.html">Orders</a>
        <a href="/static/profile.html">Profile</a>
        <a class="active" href="/static/admin.html">Admin</a>
      </nav>
      <span class="auth-chip" id="authChip"></span>
    </div>
  </header>
  <main class="container">
    <section class="layout-2" style="margin-top: 20px;">
      <div class="panel">
        <h2>Dashboard</h2>
        <div class="stats" id="adminStats"></div>
        <h3>Recent Orders</h3>
        <div id="adminOrders" class="list"></div>
      </div>
      <div class="panel">
        <h2>Add Product</h2>
        <input id="pName" placeholder="Product name" />
        <input id="pCategory" placeholder="Category" />
        <input id="pPrice" type="number" step="0.01" placeholder="Price" />
        <input id="pStock" type="number" placeholder="Stock" />
        <input id="pRating" type="number" step="0.1" min="0" max="5" placeholder="Rating (0-5)" />
        <textarea id="pDescription" placeholder="Description"></textarea>
        <input id="pImage" type="file" accept=".jpg,.jpeg,.png,.webp" />
        <button class="btn primary" id="createProductBtn">Create Product</button>
      </div>
    </section>
  </main>
  <div id="toast"></div>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/admin.js"></script>
</body>
</html>
