<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudCart | Cart & Checkout</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">CloudCart</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/static/products.html">Products</a>
        <a class="active" href="/static/cart.html">Cart</a>
        <a href="/static/orders.html">Orders</a>
        <a href="/static/profile.html">Profile</a>
        <a href="/static/admin.html">Admin</a>
      </nav>
      <span class="auth-chip" id="authChip"></span>
    </div>
  </header>
  <main class="container">
    <section class="layout-2" style="margin-top: 20px;">
      <div class="panel">
        <h2>Your Shopping Cart</h2>
        <div id="cartItems" class="list"></div>
      </div>
      <div class="panel">
        <h2>Checkout</h2>
        <p>Review your shipping details before placing order.</p>
        <textarea id="shippingAddress" placeholder="Enter complete shipping address"></textarea>
        <div class="row space-between">
          <strong>Total</strong>
          <strong id="cartTotal">$0.00</strong>
        </div>
        <button class="btn primary" id="placeOrderBtn" style="margin-top: 12px;">Place Order</button>
      </div>
    </section>
  </main>
  <div id="toast"></div>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/cart.js"></script>
</body>
</html>
