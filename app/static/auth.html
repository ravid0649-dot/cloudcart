<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudCart | Login</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">CloudCart</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/static/products.html">Products</a>
      </nav>
      <span class="auth-chip" id="authChip"></span>
    </div>
  </header>
  <main>
    <section class="panel auth-box">
      <h2>Login / Signup</h2>
      <p class="product-meta">Sign in to manage cart, orders, profile, and wishlist.</p>
      <input id="fullNameInput" placeholder="Full name (for signup)" />
      <input id="emailInput" placeholder="Email address" />
      <input id="passwordInput" type="password" placeholder="Password" />
      <div class="row">
        <button class="btn primary" id="loginBtn">Login</button>
        <button class="btn" id="signupBtn">Signup</button>
      </div>
      <p style="margin-top:12px;">Seeded admin: <strong>admin@cloudcart.com / Admin@12345</strong></p>
    </section>
  </main>
  <div id="toast"></div>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
