services:
  - type: web
    name: cloudcart-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cloudcart-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://cloudcart-web.onrender.com

databases:
  - name: cloudcart-db
    plan: free
